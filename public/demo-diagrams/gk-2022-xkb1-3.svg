<svg viewBox="0 0 520 340" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="14" markerHeight="14" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M1 2 L13 7 L1 12 Z" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="14" markerHeight="14" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M1 2 L13 7 L1 12 Z" fill="#10B981"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="520" height="340" fill="#FAFAFA" rx="10"/>

  <!-- 三角形 ABC（顶点坐标精确对齐） -->
  <!-- A(90,280)  B(420,280)  C(255,60) -->
  <line x1="90" y1="280" x2="420" y2="280" stroke="#374151" stroke-width="2"/>
  <line x1="420" y1="280" x2="255" y2="60" stroke="#374151" stroke-width="2"/>
  <line x1="255" y1="60" x2="90" y2="280" stroke="#374151" stroke-width="2"/>

  <!-- 顶点标签 -->
  <text x="68" y="298" font-family="serif" font-size="20" font-weight="bold" fill="#1F2937" font-style="italic">A</text>
  <text x="426" y="298" font-family="serif" font-size="20" font-weight="bold" fill="#1F2937" font-style="italic">B</text>
  <text x="258" y="54" font-family="serif" font-size="20" font-weight="bold" fill="#1F2937" font-style="italic">C</text>

  <!-- D点：BD=2DA，AB长330，AD=110，D(200,280) -->
  <circle cx="200" cy="280" r="5" fill="#EF4444"/>
  <text x="188" y="308" font-family="serif" font-size="18" font-weight="bold" fill="#EF4444" font-style="italic">D</text>

  <!-- 底边比例标注 -->
  <line x1="120" y1="293" x2="195" y2="293" stroke="#EF4444" stroke-width="1.2"/>
  <text x="142" y="308" font-family="sans-serif" font-size="11" fill="#EF4444">DA</text>
  <line x1="205" y1="293" x2="410" y2="293" stroke="#EF4444" stroke-width="1.2"/>
  <text x="290" y="308" font-family="sans-serif" font-size="11" fill="#EF4444">BD = 2DA</text>

  <!-- 向量 CA = m（蓝色，从C指向A，箭头在A点） -->
  <line x1="255" y1="60" x2="90" y2="280" stroke="#3B82F6" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="148" y="150" font-family="serif" font-size="18" font-weight="bold" fill="#3B82F6" font-style="italic">m</text>

  <!-- 向量 CD = n（绿色，从C指向D，箭头在D点） -->
  <line x1="255" y1="60" x2="200" y2="280" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="218" y="150" font-family="serif" font-size="18" font-weight="bold" fill="#10B981" font-style="italic">n</text>

  <!-- 信息框 -->
  <rect x="340" y="80" width="160" height="72" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="350" y="102" font-family="sans-serif" font-size="12" fill="#374151">BD = 2·DA</text>
  <text x="350" y="122" font-family="serif" font-size="12" fill="#6B7280" font-style="italic">CA</text>
  <text x="373" y="122" font-family="sans-serif" font-size="12" fill="#6B7280"> = </text>
  <text x="392" y="122" font-family="serif" font-size="13" fill="#3B82F6" font-style="italic">m</text>
  <text x="350" y="142" font-family="serif" font-size="12" fill="#6B7280" font-style="italic">CD</text>
  <text x="373" y="142" font-family="sans-serif" font-size="12" fill="#6B7280"> = </text>
  <text x="392" y="142" font-family="serif" font-size="13" fill="#10B981" font-style="italic">n</text>
</svg>
